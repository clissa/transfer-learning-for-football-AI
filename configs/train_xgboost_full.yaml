# Configuration for scripts/train_xgboost.py
# Usage: python -m scripts.train_xgboost --config configs/train_xgboost.yaml
#
# Data split strategy:
# - Source: training competitions (split into train 80% / validation 20% by matches, stratified by league)
# - Calib: calibration competitions (reserved for future use)
# - Target: test competitions (0-shot evaluation)

data:
  file: "data/feat_engineered_vaep_data/all_leagues_vaep.h5"
  key_candidates: ["feat_engineered_vaep_data", "vaep_data"]
  target_col: "scores"        # or "concedes"

split:
  # Source: competitions used for training (split into train 80% / validation 20% by matches, stratified by league)
  source_competitions: [
    "Premier League", "La Liga", "Copa del Rey",
    "1. Bundesliga", "Serie A", "Ligue 1",
    "Champions League", "UEFA Europa League", 
    ]
  # Calib: reserved for calibration (not used in current training)
  calib_competitions: [
    "FA Women's Super League",
    "Women's World Cup",
    "UEFA Women's Euro"
    ]
  # Target: 0-shot evaluation competitions
  target_competitions: [
    "FIFA World Cup", "UEFA Euro", "FIFA U20 World Cup",
    "Copa America", "Liga Profesional", 
    "African Cup of Nations", "Indian Super league",
    "Major League Soccer", "NWSL", "North American League",
    ]
  # Fraction of source matches to use for validation (stratified by league)
  validation_frac: 0.2

model:
  objective: "binary:logistic"
  # base_score: 0.8
  # booster: "gbtree"
  # tree_method: "hist"
  device: "cpu"
  n_estimators: 1000
  learning_rate: 0.2
  verbosity: 1
  n_jobs: 16
  random_state: None

  # Tree complexity / regularization
  max_depth: 10
  # max_leaves: 0
  # max_bin: 256
  grow_policy: "lossguide"
  gamma: 1.0
  # min_child_weight: 5.0
  max_delta_step: 2

  # Subsampling
  subsample: 0.4
  sampling_method: "gradient_based"
  colsample_bytree: 0.8
  colsample_bylevel: 0.8
  colsample_bynode: 0.8

  # L1/L2 and imbalance
  reg_alpha: 0.2
  reg_lambda: 1.5
  scale_pos_weight: 20

  # Eval and early stopping
  # eval_metric: ["aucpr", "logloss", "auc"]
  # eval_metric: ["logloss", "auc", "aucpr"]
  eval_metric: ['aucpr', 'auc', 'logloss', 'f1', 'precision', 'recall']
  early_stopping_rounds: 100
  # Which metric to monitor for early stopping (default: last in eval_metric).
  # Decouples stopping criterion from eval_metric order.
  early_stopping_metric: "auc"

  # sklearn wrapper controls
  # importance_type: "gain"
  # validate_parameters: true

fit:
  verbose: true

validation:
  mode: "train_val_split"       # or "none"
  include_train_in_eval_set: false

threshold:
  enabled: true
  pred_threshold: 0.5
  min: 0.35
  max: 0.65
  steps: 30

output:
  dir: "results/all_leagues/train_xgboost_vaep_auc"
  models_dir: "models"
