# Configuration for scripts/xgboost-few-shots.py
# Usage: python -m scripts.xgboost-few-shots --config configs/xgboost_fewshot.yaml
#
# Evaluates domain adaptation at multiple target-game budgets.
# For each budget, compares:
#   1. target-only  (train from scratch on the few-shot subset)
#   2. fine-tune    (warm-start from a pre-trained source model)
# Plus a source-only zero-shot baseline (no re-training).

data:
  file: "data/vaep_data/all_leagues_vaep.h5"
  key_candidates: ["vaep_data"]
  target_col: "scores"        # or "concedes"

split:
  source_competitions: [
    "Premier League", "La Liga", "Copa del Rey", 
    "1. Bundeliga", "Serie A", "Ligue 1", 
    "Champions League", "UEFA Europa League", 
    ]
  target_competitions: [
    "FA Women's Super League", "Women's World Cup", "UEFA Women's Euro",
    "FIFA World Cup", "UEFA Euro", "FIFA U20 World Cup",
    "Copa America", "Liga Profesional", 
    "African Cup of Nations", "Indian Super league",
    "Major League Soccer", "NWSL", "North American League",
    ]
  validation_frac: 0.2        # source train/val split fraction
  random_state: 20140916

# Few-shot experiment settings
fewshot:
  budgets: [0.05, 0.15, 0.30, 0.50]           # fraction of target games sampled
  seeds: [19920402, 19901229, 19921020, 20250726, 20100522]                # repeat each budget with different seeds
  source_model_path: "models/xgboost_scores_20260309_094743_seed761136_auc=0.8099.pkl"

# Source model config (used for target-only from-scratch training)
model:
  objective: "binary:logistic"
  booster: "gbtree"
  tree_method: "hist"
  device: "cpu"
  n_estimators: 500
  learning_rate: 0.02
  verbosity: 1
  n_jobs: 16

  max_depth: 8
  # max_bin: 256
  grow_policy: "lossguide"
  gamma: 1.0
  # min_child_weight: 1.0
  max_delta_step: 2

  subsample: 0.8
  sampling_method: "gradient_based"
  colsample_bytree: 0.8
  colsample_bylevel: 0.6
  colsample_bynode: 0.6

  reg_alpha: 0.2
  reg_lambda: 1.5
  scale_pos_weight: 20

  eval_metric: ['aucpr', 'auc', 'logloss', 'f1', 'precision', 'recall']
  early_stopping_rounds: 50
  early_stopping_metric: "auc"

  importance_type: "gain"
  validate_parameters: true

# Fine-tuning overrides (warm-start from source model)
finetune:
  n_estimators: 1000            # fewer additional boosting rounds
  learning_rate: 0.02          # reduced LR for gentle adaptation
  verbosity: 1
  n_jobs: 16

  max_depth: 8
  # max_bin: 256
  grow_policy: "lossguide"
  gamma: 1.0
  # min_child_weight: 5.0
  max_delta_step: 2.0

  subsample: 0.8
  sampling_method: "gradient_based"
  colsample_bytree: 0.8
  colsample_bylevel: 0.6
  colsample_bynode: 0.6

  reg_alpha: 0.2
  reg_lambda: 1.5
  scale_pos_weight: 20

  eval_metric: ['aucpr', 'auc', 'logloss', 'f1', 'precision', 'recall']
  early_stopping_rounds: 50
  early_stopping_metric: "auc"
  
threshold:
  enabled: true
  pred_threshold: 0.5
  min: 0.35
  max: 0.65
  steps: 30

output:
  dir: "results/all_leagues/fewshot_xgboost_auc-lossiwise-allsame_5-15-30-50"
