# Configuration for scripts/train_xgboost.py
# Usage: python -m scripts.train_xgboost --config configs/train_xgboost.yaml
#
# Data split strategy:
# - Source: La Liga except selected held-out seasons
# - Source train/val: split by matches, stratified by season_id
# - Model selection: in-domain source validation only
# - Test: inferred league_shift / year_shift / league_season_shift testbeds
# - Target: residual competition-seasons not used by source or test
# - Calib: auxiliary view that may overlap any non-source split

data:
  file: "data/feat_engineered_vaep_data/major_leagues_vaep.h5"
  key_candidates: ["feat_engineered_vaep_data", "vaep_data"]
  target_col: "scores"        # or "concedes"

split:
  source:
    competitions: ["La Liga"]
    exclude_seasons: ["1973-74", "2019-20", "2020-21"]

  calib:
    competitions: ["Champions League", "UEFA Europa League"]

  test:
    competitions: [
      "La Liga",
      "Premier League",
      "Serie A",
      "1. Bundesliga",
      "Ligue 1",
      "Champions League",
      "UEFA Europa League",
    ]
    year_shift:
      seasons: ["2019-20", "2020-21"]
    # Optional manual additions to league_season_shift.
    # Leave empty to infer non-overlapping seasons automatically.
    league_season_shift:
      explicit: {}

  # Fraction of source matches to use for validation (stratified by season_id)
  validation_frac: 0.2

model:
  objective: "binary:logistic"
  # base_score: 0.8
  # booster: "gbtree"
  # tree_method: "hist"
  device: "cpu"
  n_estimators: 2000
  learning_rate: 0.2
  verbosity: 1
  n_jobs: -1
  random_state: None

  # Tree complexity / regularization
  max_depth: 10
  # max_leaves: 0
  # max_bin: 256
  grow_policy: "lossguide"
  gamma: 1.0
  # min_child_weight: 5.0
  max_delta_step: 2

  # Subsampling
  subsample: 0.6
  sampling_method: "gradient_based"
  colsample_bytree: 0.8
  colsample_bylevel: 0.8
  colsample_bynode: 0.8

  # L1/L2 and imbalance
  reg_alpha: 0.2
  reg_lambda: 1.5
  scale_pos_weight: 20

  # Eval and early stopping
  # eval_metric: ["aucpr", "logloss", "auc"]
  # eval_metric: ["logloss", "auc", "aucpr"]
  eval_metric: ['aucpr', 'auc', 'logloss', 'f1', 'precision', 'recall']
  early_stopping_rounds: 100
  # Which metric to monitor for early stopping (default: last in eval_metric).
  # Decouples stopping criterion from eval_metric order.
  early_stopping_metric: "auc"

  # sklearn wrapper controls
  # importance_type: "gain"
  # validate_parameters: true

fit:
  verbose: true

validation:
  mode: "train_val_split"       # or "none"
  include_train_in_eval_set: false

threshold:
  enabled: true
  pred_threshold: 0.5
  min: 0.35
  max: 0.65
  steps: 30

output:
  dir: "results/train_xgboost_vaep_auc-1"
  models_dir: "models"
