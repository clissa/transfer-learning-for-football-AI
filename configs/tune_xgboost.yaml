# Configuration for scripts/tune_xgboost.py
# Usage: python -m scripts.tune_xgboost --config configs/tune_xgboost.yaml

data:
  file: "data/feat_engineered_vaep_data/all_leagues_vaep.h5"
  key_candidates: ["feat_engineered_vaep_data", "vaep_data"]
  target_col: "scores"  # or "concedes"

selected_metric: "roc_auc"
seed: null
device: "cuda"

split:
  validation_frac: 0.2
  source:
    competitions: ["La Liga"]
    exclude_seasons: ["2019-20", "2020-21"]
  calib:
    competitions: ["Champions League", "UEFA Europa League"]
  test:
    competitions:
      - "La Liga"
      - "Premier League"
      - "Serie A"
      - "1. Bundesliga"
      - "Ligue 1"
      - "Champions League"
      - "UEFA Europa League"
    year_shift:
      seasons: ["2019-20", "2020-21"]
    league_season_shift:
      explicit: {}

optuna:
  n_trials: 500
  timeout_seconds: null

training:
  early_stopping_rounds: 100

model:
  base_params:
    booster: "gbtree"
    tree_method: "hist"
    n_jobs: -1
    verbosity: 0
    validate_parameters: true
    importance_type: "gain"
    objective: "binary:logistic"
    eval_metric: "auc"
    enable_categorical: true

search_space:
  n_estimators:
    low: 100
    high: 5000
    log: true
  learning_rate:
    low: 0.01
    high: 0.15
    log: true
  grow_policy: ["depthwise", "lossguide"]
  max_depth:
    low: 4
    high: 10
  max_leaves:
    low: 31
    high: 511
  min_child_weight:
    low: 1
    high: 64
    log: true
  gamma:
    low: 0
    high: 10
  subsample:
    low: 0.5
    high: 1.0
  colsample_bytree:
    low: 0.4
    high: 1.0
  reg_alpha:
    low: 0.001
    high: 5
    log: true
  reg_lambda:
    low: 0.5
    high: 20
    log: true
  scale_pos_weight:
    low: 10
    high: 120
  max_delta_step:
    low: 0
    high: 10
  max_bin: 256

threshold:
  min: 0.05
  max: 0.95
  steps: 90

output:
  root: "results/xgboost_tuning/roc_auc_scores"
